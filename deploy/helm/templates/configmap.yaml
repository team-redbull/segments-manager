apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "segments-manager.fullname" . }}
  labels:
    {{- include "segments-manager.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  # Site configuration
  SITE_PREFIXES: {{ .Values.config.sitePrefixes | quote }}

  # Server configuration
  SERVER_HOST: {{ .Values.config.serverHost | quote }}
  SERVER_PORT: {{ .Values.config.serverPort | quote }}

  # Logging configuration
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  LOG_FILE: {{ .Values.config.logFile | quote }}

  # MongoDB configuration (URL itself comes from the Secret)
  MONGODB_DB_NAME: {{ .Values.mongodb.dbName | quote }}
  MONGODB_TLS_INSECURE: {{ .Values.mongodb.tlsInsecure | quote }}

  # Connectivity workflow API (connectivity workflow trigger)
  CONNECTIVITY_WORKFLOW_API_URL: {{ .Values.config.connectivityWorkflowApiUrl | quote }}
