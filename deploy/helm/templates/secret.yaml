{{- if not .Values.mongodb.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "segments-manager.fullname" . }}-mongodb
  labels:
    {{- include "segments-manager.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  mongodb-url: {{ .Values.mongodb.url | b64enc | quote }}
{{- end }}
