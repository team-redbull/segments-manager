apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "segments-manager.fullname" . }}
  labels:
    {{- include "segments-manager.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "segments-manager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "segments-manager.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "segments-manager.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            # Site configuration from ConfigMap
            - name: SITES
              valueFrom:
                configMapKeyRef:
                  name: {{ include "segments-manager.fullname" . }}
                  key: SITES
            - name: SITE_PREFIXES
              valueFrom:
                configMapKeyRef:
                  name: {{ include "segments-manager.fullname" . }}
                  key: SITE_PREFIXES
            # Server configuration from ConfigMap
            - name: SERVER_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "segments-manager.fullname" . }}
                  key: SERVER_HOST
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "segments-manager.fullname" . }}
                  key: SERVER_PORT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "segments-manager.fullname" . }}
                  key: LOG_LEVEL
            - name: LOG_FILE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "segments-manager.fullname" . }}
                  key: LOG_FILE
            # MongoDB config from ConfigMap
            - name: MONGODB_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ include "segments-manager.fullname" . }}
                  key: MONGODB_DB_NAME
            - name: MONGODB_TLS_INSECURE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "segments-manager.fullname" . }}
                  key: MONGODB_TLS_INSECURE
            # MongoDB URL from Secret
            - name: MONGODB_URL
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.mongodb.existingSecret }}{{ .Values.mongodb.existingSecret }}{{ else }}{{ include "segments-manager.fullname" . }}-mongodb{{ end }}
                  key: {{ if .Values.mongodb.existingSecret }}{{ .Values.mongodb.existingSecretKey }}{{ else }}mongodb-url{{ end }}
            # API token from Secret (required for write requests)
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.auth.existingSecret }}{{ .Values.auth.existingSecret }}{{ else }}{{ include "segments-manager.fullname" . }}-auth{{ end }}
                  key: {{ if .Values.auth.existingSecret }}{{ .Values.auth.existingSecretKey }}{{ else }}api-token{{ end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "segments-manager.fullname" . }}-data
      {{- end }}