# VLAN Manager Helm Chart Values

# Global configuration
nameOverride: ""
fullnameOverride: ""

# Image configuration
image:
  repository: vlan-manager
  tag: v2.0.0
  pullPolicy: IfNotPresent
  pullSecrets: []

# Pod configuration
replicaCount: 1
podAnnotations: {}
podLabels: {}

# Security context.
# Left empty so the container runs as the image default (root, UID 0), which
# can write /app/vlan_manager.log. To run as a non-root user instead, populate
# these blocks (e.g. runAsNonRoot: true / runAsUser: 1001) AND set LOG_FILE to a
# writable path such as /app/data/vlan_manager.log.
podSecurityContext: {}

securityContext: {}

# Service configuration
service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
  annotations: {}

# OpenShift Route configuration
route:
  enabled: true
  annotations: {}
  host: ""  # Leave empty for auto-generated
  path: ""
  wildcardPolicy: None
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect


# Application ConfigMap
config:
  sites: "site1,site2,site3"
  sitePrefixes: "site1:192,site2:193,site3:194"
  serverHost: "0.0.0.0"
  serverPort: "8000"
  logLevel: "INFO"

# MongoDB Configuration
mongodb:
  # MongoDB connection URL - REQUIRED (stored in Secret)
  # Example: mongodb://user:pass@mongodb:27017 or mongodb+srv://... for Atlas
  url: "mongodb://localhost:27017"

  # Database name (optional, default: vlan_manager)
  dbName: "vlan_manager"

  # Use existing secret for MongoDB URL (optional)
  existingSecret: ""
  existingSecretKey: "mongodb-url"

# Persistent Volume Claim
persistence:
  enabled: false
  storageClass: ""  # Uses default StorageClass
  accessMode: ReadWriteOnce
  size: 1Gi
  annotations: {}
  mountPath: /app/data

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Health checks
livenessProbe:
  httpGet:
    path: /api/health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /api/health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 12

# Pod placement
nodeSelector: {}
tolerations: []
affinity: {}

# Service Account
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Additional labels and annotations
commonLabels: {}
commonAnnotations: {}