name: GHCR cleanup - keep latest per branch

# Prunes old per-commit images pushed by build.yml for non-main branches,
# keeping only the newest tag per branch slug. main's vX.Y.Z release tags
# are never touched. Runs nightly, or on demand via workflow_dispatch.

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Prune old non-main branch tags
        env:
          GH_TOKEN: ${{ secrets.GHCR_CLEANUP_TOKEN }}
        run: |
          set -euo pipefail
          OWNER="team-redbull"
          PACKAGE="segments-manager"
          KEEP=1

          gh api --paginate "/orgs/${OWNER}/packages/container/${PACKAGE}/versions?per_page=100" \
            > versions.json

          jq -r --argjson keep "$KEEP" '
            [ .[] | select(.metadata.container.tags | length > 0)
              | { id, created_at, tag: .metadata.container.tags[0] }
              | select(.tag | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$") | not)
              | . + { slug: (.tag | sub("-[0-9a-f]{7,40}$"; "")) } ]
            | group_by(.slug)
            | map(sort_by(.created_at) | reverse | .[$keep:])
            | flatten
            | .[] | "\(.id)\t\(.tag)"
          ' versions.json | while IFS=$'\t' read -r id tag; do
              echo "Deleting version $id (tag: $tag)"
              gh api -X DELETE "/orgs/${OWNER}/packages/container/${PACKAGE}/versions/${id}"
            done
